<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Show Glass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f5f7fc;
      --border: #e0e7ff;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-dark: #1e40af;
      --accent-light: #eff6ff;
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --shadow-sm: 0 2px 4px rgba(15,23,42,0.05);
      --shadow: 0 4px 12px rgba(15,23,42,0.08);
      --shadow-md: 0 8px 20px rgba(15,23,42,0.12);
      --shadow-lg: 0 16px 40px rgba(15,23,42,0.15);
      --shadow-xl: 0 24px 48px rgba(15,23,42,0.18);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      --max-w: 900px;
      --transition: 0.2s cubic-bezier(0.23, 1, 0.320, 1);
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; font-weight: 500; }

    /* ── Layout ── */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 20px; }

    /* ── Header ── */
    .site-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.95);
    }
    .site-header .container { display: flex; align-items: center; justify-content: space-between; }
    .site-logo {
      font-size: 1.25rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none; letter-spacing: -0.03em;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius); font-size: 0.9rem;
      font-weight: 600; border: none; cursor: pointer;
      text-decoration: none; transition: all var(--transition); line-height: 1.4;
      font-family: var(--font);
    }
    .btn-primary { background: var(--accent-gradient); color: #fff; box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
    .btn-secondary { background: var(--surface); color: var(--accent); border: 2px solid var(--accent); }
    .btn-secondary:hover { background: var(--accent-light); transform: translateY(-2px); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); transform: translateY(-2px); }
    .btn-ghost { background: transparent; color: var(--text-secondary); padding: 8px 14px; font-weight: 600; }
    .btn-ghost:hover { color: var(--accent); background: var(--accent-light); }
    .btn-sm { padding: 8px 16px; font-size: 0.8125rem; }
    .btn-icon { padding: 8px; border-radius: var(--radius); }

    /* ── Forms ── */
    .form-group { margin-bottom: 24px; }
    .form-label {
      display: block; font-size: 0.875rem; font-weight: 700;
      color: var(--text); margin-bottom: 8px;
    }
    .form-hint { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 6px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 12px 16px; border: 2px solid var(--border);
      border-radius: var(--radius); font-size: 1rem; font-family: var(--font);
      color: var(--text); background: var(--bg); transition: all var(--transition);
      line-height: 1.5; font-weight: 500;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-tertiary); }
    .form-textarea { resize: vertical; min-height: 100px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 32px;
      box-shadow: var(--shadow-sm); transition: all var(--transition);
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); }

    /* ── Views ── */
    .view { display: none; padding: 32px 0 60px; }
    .view.active { display: block; }

    /* ════════════════════════════
       HOME VIEW
    ════════════════════════════ */
    .home-hero { text-align: center; padding: 80px 0 60px; }
    .home-hero h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 16px; line-height: 1.1; }
    .home-hero p { color: var(--text-secondary); font-size: 1.25rem; font-weight: 500; max-width: 520px; margin: 0 auto 40px; line-height: 1.6; }
    .home-search-wrap {
      max-width: 480px; margin: 0 auto 20px; position: relative;
    }
    .home-search-wrap .form-input { padding-left: 44px; font-size: 1rem; }
    .home-search-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; color: var(--text-tertiary);
    }
    .home-profiles { margin-top: 60px; }
    .home-profiles h2 { font-size: 0.875rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 24px; }
    .profile-list { display: grid; gap: 16px; }
    .profile-list-item {
      display: flex; align-items: center; gap: 18px;
      padding: 20px 24px; background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius-lg); text-decoration: none; color: var(--text);
      transition: all var(--transition);
    }
    .profile-list-item:hover { box-shadow: var(--shadow-md); border-color: var(--accent); transform: translateY(-4px); }
    .profile-list-avatar {
      width: 56px; height: 56px; border-radius: 50%; background: var(--accent-gradient);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #fff; font-size: 1.25rem;
      overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }
    .profile-list-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-list-info { flex: 1; min-width: 0; }
    .profile-list-name { font-weight: 700; font-size: 1rem; }
    .profile-list-bio {
      font-size: 0.875rem; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-list-arrow { color: var(--accent); flex-shrink: 0; font-weight: bold; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state p { margin-bottom: 24px; font-size: 1.1rem; }

    /* ════════════════════════════
       PUBLIC PROFILE VIEW
    ════════════════════════════ */
    .profile-header { text-align: center; padding-bottom: 48px; border-bottom: 2px solid var(--border); margin-bottom: 48px; }
    .profile-avatar {
      width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 24px;
      background: var(--accent-gradient); display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 2.5rem; color: #fff; overflow: hidden; box-shadow: 0 8px 24px rgba(59,130,246,0.35);
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; }
    .profile-username { font-size: 1rem; color: var(--accent); margin-top: 4px; font-weight: 600; }
    .profile-bio { color: var(--text-secondary); margin-top: 12px; font-size: 1.1rem; max-width: 540px; margin-left: auto; margin-right: auto; font-weight: 500; line-height: 1.6; }

    .content-section-title { font-size: 0.875rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 24px; }

    .featured-card {
      background: var(--surface); border: 3px solid var(--accent);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 48px;
      box-shadow: 0 8px 28px rgba(59,130,246,0.15);
      transition: all var(--transition);
    }
    .featured-card:hover { box-shadow: 0 12px 36px rgba(59,130,246,0.25); transform: translateY(-6px); }
    .featured-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-gradient); color: #fff; font-size: 0.75rem;
      font-weight: 700; padding: 6px 14px; border-radius: 24px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .featured-card .card-body { padding: 28px 32px; }
    .featured-card .card-thumb {
      width: 100%; height: 240px; object-fit: cover; display: block;
    }

    .content-grid { display: grid; gap: 18px; }
    .content-card {
      display: flex; gap: 20px; align-items: flex-start;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px;
      text-decoration: none; color: var(--text);
      transition: all var(--transition);
    }
    .content-card:hover { box-shadow: var(--shadow-md); border-color: var(--accent); transform: translateY(-4px); }
    .content-card-thumb {
      width: 80px; height: 80px; border-radius: var(--radius); object-fit: cover; flex-shrink: 0; box-shadow: var(--shadow-sm);
    }
    .content-card-body { flex: 1; min-width: 0; }
    .content-card-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
    .content-card-desc { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 12px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
    .content-card-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .content-tag {
      font-size: 0.75rem; font-weight: 700; padding: 4px 12px;
      background: var(--accent-light); border-radius: 20px; color: var(--accent);
      border: none;
    }
    .content-card-link { font-size: 0.8rem; color: var(--accent); display: flex; align-items: center; gap: 4px; font-weight: 600; }

    .profile-not-found { text-align: center; padding: 100px 20px; }
    .profile-not-found h2 { font-size: 1.75rem; margin-bottom: 12px; font-weight: 800; }
    .profile-not-found p { color: var(--text-secondary); margin-bottom: 32px; font-size: 1.1rem; }

    /* ════════════════════════════
       EDIT PROFILE VIEW
    ════════════════════════════ */
    .edit-section { margin-bottom: 48px; }
    .edit-section-title { font-size: 2rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    .edit-section-subtitle { font-size: 1rem; color: var(--text-secondary); margin-top: 0; margin-bottom: 32px; font-weight: 500; }

    .avatar-upload {
      display: flex; align-items: center; gap: 20px; margin-bottom: 28px; padding-bottom: 28px; border-bottom: 2px solid var(--border);
    }
    .avatar-preview {
      width: 88px; height: 88px; border-radius: 50%; background: var(--accent-gradient);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #fff; font-size: 1.75rem; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Content Entries List ── */
    .entries-list { display: grid; gap: 14px; margin-top: 20px; }
    .entry-item {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px; background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); transition: all var(--transition);
    }
    .entry-item.is-featured { border-color: var(--accent); background: linear-gradient(135deg, rgba(59,130,246,0.05) 0%, transparent 100%); }
    .entry-item-body { flex: 1; min-width: 0; }
    .entry-item-title { font-weight: 700; font-size: 0.9375rem; }
    .entry-item-link {
      font-size: 0.8rem; color: var(--text-tertiary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry-item-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Content Metadata ── */
    .content-meta-compact {
      font-size: 0.75rem; color: var(--text-tertiary);
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      margin-top: 8px;
    }
    .content-meta-item { display: flex; align-items: center; gap: 4px; }
    .content-meta-item svg { width: 14px; height: 14px; }

    /* ── Discover View ── */
    .discover-header { margin-bottom: 48px; }
    .discover-filters {
      display: flex; gap: 12px; align-items: center; margin-bottom: 32px; flex-wrap: wrap;
    }
    .discover-filters .form-input {
      flex: 1; min-width: 200px; margin-bottom: 0;
      padding: 12px 16px; font-size: 0.95rem;
    }
    .filter-tag {
      padding: 8px 16px; background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all var(--transition);
      color: var(--text-secondary);
    }
    .filter-tag:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .discover-results { display: grid; gap: 20px; }
    .discover-item {
      display: grid; grid-template-columns: 120px 1fr; gap: 20px; align-items: start;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px;
      transition: all var(--transition);
    }
    .discover-item:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-4px); }
    .discover-item-thumb {
      width: 120px; height: 120px; border-radius: var(--radius); object-fit: cover; box-shadow: var(--shadow-sm);
    }
    .discover-item-content { display: flex; flex-direction: column; gap: 12px; }
    .discover-item-header { display: flex; align-items: flex-start; gap: 12px; justify-content: space-between; flex-wrap: wrap; }
    .discover-item-header-left { flex: 1; }
    .discover-item-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .discover-item-profile { display: flex; align-items: center; gap: 8px; }
    .discover-item-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--accent-gradient);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; font-size: 0.7rem; overflow: hidden;
    }
    .discover-item-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .discover-item-profile-name { font-weight: 700; font-size: 0.9rem; }
    .discover-item-profile-user { font-size: 0.8rem; color: var(--text-tertiary); }
    .discover-item-desc {
      font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .discover-item-footer { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .discover-item-meta { display: flex; gap: 16px; align-items: center; font-size: 0.8rem; color: var(--text-tertiary); }
    .discover-item-actions { display: flex; gap: 8px; }
    .discover-empty { text-align: center; padding: 60px 20px; }
    .discover-empty p { font-size: 1.1rem; margin-bottom: 24px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.4);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 20px; backdrop-filter: blur(8px);
    }
    .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--bg); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl); width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto; padding: 36px; border: 1px solid var(--border);
    }
    .modal-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 28px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; }

    /* ── Confirm dialog ── */
    .confirm-text { color: var(--text-secondary); font-size: 1rem; margin-bottom: 8px; line-height: 1.6; }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      display: flex; flex-direction: column; gap: 12px;
    }
    .toast {
      padding: 14px 20px; background: var(--text); color: #fff;
      border-radius: var(--radius); font-size: 0.9rem; font-weight: 600;
      box-shadow: var(--shadow-xl); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .home-hero h1 { font-size: 2.5rem; }
      .home-hero p { font-size: 1.1rem; }
      .home-hero { padding: 60px 0 40px; }
      .view { padding: 28px 0 52px; }
      .profile-avatar { width: 100px; height: 100px; font-size: 2rem; }
      .profile-name { font-size: 1.75rem; }
      .featured-card .card-thumb { height: 180px; }
      .edit-section-title { font-size: 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
      .modal { padding: 24px; }
      .entry-item { flex-wrap: wrap; }
      .entry-item-actions { width: 100%; justify-content: flex-end; }
      .discover-filters { flex-direction: column; align-items: stretch; }
      .discover-filters .form-input { min-width: auto; }
      .discover-item { grid-template-columns: 1fr; }
      .discover-item-thumb { width: 100%; height: 200px; }
    }
  </style>
</head>
<body>

  <!-- ─── Header ─── -->
  <header class="site-header">
    <div class="container">
      <a href="#/" class="site-logo">Content<span>Show</span>Glass</a>
      <div class="header-actions" id="headerActions"></div>
    </div>
  </header>

  <!-- ─── App Root ─── -->
  <main id="app">

    <!-- HOME VIEW -->
    <section id="viewHome" class="view">
      <div class="container">
        <div class="home-hero">
          <h1>Proof of Work,<br/>Not Proof of Popularity</h1>
          <p>A lightweight portfolio showcase. No likes. No followers. Just your work.</p>
          <div class="home-search-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
            <input type="text" class="form-input" id="homeSearch" placeholder="Search profiles..." autocomplete="off" />
          </div>
        </div>
        <div class="home-profiles" id="homeProfiles"></div>
      </div>
    </section>

    <!-- PUBLIC PROFILE VIEW -->
    <section id="viewProfile" class="view">
      <div class="container" id="profileContent"></div>
    </section>

    <!-- EDIT PROFILE VIEW -->
    <section id="viewEdit" class="view">
      <div class="container" id="editContent"></div>
    </section>

    <!-- DISCOVER/SEARCH VIEW -->
    <section id="viewDiscover" class="view">
      <div class="container" id="discoverContent"></div>
    </section>

  </main>

  <!-- ─── Entry Modal ─── -->
  <div class="modal-overlay" id="entryModal">
    <div class="modal">
      <div class="modal-title" id="entryModalTitle">Add Content</div>
      <form id="entryForm">
        <input type="hidden" id="entryEditId" />
        <div class="form-group">
          <label class="form-label" for="entryTitle">Title</label>
          <input type="text" class="form-input" id="entryTitle" placeholder="e.g. My Blog Post" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="entryDesc">Short Description</label>
          <textarea class="form-textarea" id="entryDesc" rows="2" placeholder="Brief description of this content..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="entryLink">External Link</label>
          <input type="url" class="form-input" id="entryLink" placeholder="https://..." required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="entryThumb">Thumbnail URL <span style="font-weight:400;color:var(--text-tertiary)">(optional)</span></label>
            <input type="url" class="form-input" id="entryThumb" placeholder="https://..." />
          </div>
          <div class="form-group">
            <label class="form-label" for="entryTag">Tag / Category <span style="font-weight:400;color:var(--text-tertiary)">(optional)</span></label>
            <input type="text" class="form-input" id="entryTag" placeholder="e.g. Article" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px;margin-bottom:0;cursor:pointer;">
            <input type="checkbox" id="entryFeatured" style="accent-color:var(--accent);width:18px;height:18px;cursor:pointer;" />
            <span>Mark as Featured</span>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="entryModalCancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="entryModalSave">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Confirm Modal ─── -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-title" id="confirmTitle">Confirm</div>
      <p class="confirm-text" id="confirmText"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <!-- ─── Toast Container ─── -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
